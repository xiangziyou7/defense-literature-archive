hich paves the way for OVs to become service-providing components in the web services architecture.", "journal": "Journal of Defense Modeling and Simulation", "relevance": 0.3333333333333333, "direction": "智能侵彻", "subcategory": "电子战应用", "matched_keywords": ["EW"], "authors": [], "year": "", "source": "", "url": "https://xueshu.baidu.com/ndscholar/browse/detail?paperid=d2c462630d410b21eff1b0862f24cf0b", "seen_at": "2026-03-26T18:36:45.451465", "downloaded": false}, {"title": "Profile of modeling and simulation research published in the Journal of Defense Modeling and Simulation", "doi": "10.1177/1548512917739218", "abstract": "The <em>Journal of Defense Modeling and Simulation</em> (JDMS) publishes peer-reviewed articles in modeling and simulation (M&S) in the application area of military and defense. We profile literature published in JDMS from 2012 to 2016. Over 150 contributed and special issue papers appeared in a total of 20 issues of the journal during this period. Our analysis includes the contribution of the authors and their respective universities/departments using measures such as total papers published, count of unique authors in an institution, and authors with the most number of publications; it recognizes the geographical diversity of the authors€ affiliations by presenting country-specific data. The analysis takes into account the contribution made by researchers, practitioners and military personnel and their relative seniority. We identify the most cited papers and present an aggregate analysis of contribution by research field. We also identify the top funding sources that are acknowledged by the authors. Our findings show the predominance of US in research related to defense M&S. This includes the US-based affiliation of a significant proportion of JDMS authors and the concentration of US-specific bodies that fund defense-related research.", "journal": "Journal of Defense Modeling and Simulation", "relevance": 0.3333333333333333, "direction": "智能侵
