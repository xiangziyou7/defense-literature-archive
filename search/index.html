    </style>
</head>

 "downloaded": false}, {"title": "Updating Aerospace and Defense ATS", "doi": "10.1002/dac.1246", "abstract": "Some of the at the challenges towards the replacement of legacy testers and the underlying factors behind the Department of Defense's (DoD) long-term system upgrade strategy are discussed. The memorandum designated the Army's Integrated Family of Test Equipment (IFTE) focused on providing a vertically integrated automatic test system (ATS) capability for sustainment and field levels of maintenance. The Joint Services Electronic Combat System Tester (JSECST) represents a joint USAF-USN procurement program featuring a flight line electronic warfare systems tester for end-to-end functional testing capability of electronic combat systems installed in or on operational aircraft. The Next Generation Automatic Test Systems (NxTest) Integrated Product Team (IPT) was chartered by the DoD to jointly develop the technologies necessary for implementation in the next generation of ATS.", "journal": "International Journal of Aerospace and Defense Technology", "relevance": 0.3333333333333333, "direction": "智能侵彻", "subcategory": "电子战应用", "matched_keywords": ["electronic warfare"], "authors": [], "year": "", "source": "", "url": "https://xueshu.baidu.com/ndscholar/browse/detail?paperid=d4e08db6c0ce494cc8bf61c010f8f3aa", "seen_at": "2026-03-26T17:46:46.539394", "downloaded": false}];
        const journals = [...new Set(papers.map(p => p.journal))];
        const journalFilter = document.getElementById('journalFilter');
        journals.forEach(j => { const opt = document.createElement('option'); opt.value = j; opt.textContent = j; journalFilter.appendChild(opt); });
        function search() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const direction = document.getElementById('directionFilter').value;
            const journal = document.getElementById('journalFilter').value;
            let filtered = papers.filter(p => {
                const matchKeyword = !keyword || p.title.toLowerCase().includes(keyword) || (p.abstract && p.abstract.toLowerCase().includes(keyword));
                const matchDirection = !direction || p.direction === direction;
                const matchJournal = !journal || p.journal === journal;
                return matchKeyword && matchDirection && matchJournal;
            });
            renderPapers(filtered);
        }
        function renderPapers(papers) {
            const list = document.getElementById('paperList');
            list.innerHTML = papers.slice(0, 100).map(p => '<div class="paper-item"><div class="paper-title">' + p.title + '</div><div class="paper-meta"><span class="tag tag-direction">' + (p.direction || '未分类') + '</span> <span class="tag tag-subcategory">' + (p.subcategory || '其他') + '</span> | ' + p.journal + ' | 相关性: ' + (p.relevance || 0).toFixed(2) + '</div><div class="paper-meta">DOI: <a href="https://doi.org/' + p.doi + '" target="_blank">' + p.doi + '</a></div></div>').join('');
        }
        renderPapers(papers);
    </script>
